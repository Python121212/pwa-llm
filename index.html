<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini-like Local LLM with Artifacts</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        #app-container {
            display: flex;
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #131314;
        }

        header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2f2f30;
        }
        .brand { font-size: 1.25rem; font-weight: 500; color: #a8c7fa; }
        
        select {
            background-color: #1e1e1f;
            color: #e3e3e3;
            border: 1px solid #444746;
            padding: 6px 12px;
            border-radius: 8px;
            outline: none;
            font-size: 0.85rem;
            cursor: pointer;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status {
            align-self: center;
            background-color: #1e1e1f;
            border: 1px solid #333538;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            max-width: 80%;
            white-space: pre-wrap;
            color: #c4c7c5;
            text-align: center;
        }

        .message {
            max-width: 85%;
            line-height: 1.6;
            word-break: break-word;
            font-size: 1rem;
        }
        .user {
            align-self: flex-end;
            background-color: #2b2a33;
            padding: 12px 18px;
            border-radius: 20px 20px 4px 20px;
        }
        .ai {
            align-self: flex-start;
            padding: 12px 0;
            width: 100%;
        }

        /* 添付ファイル表示用 */
        .file-attachment {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #004a77;
            color: #c2e7ff;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        /* 入力UI周辺・添付機能 */
        #input-outer-container {
            padding: 0 24px 24px 24px;
            background-color: #131314;
        }
        #file-preview-area {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            flex-wrap: wrap;
        }
        .preview-pill {
            background-color: #28292a;
            border: 1px solid #444746;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .remove-pill { cursor: pointer; color: #ffb4ab; font-weight: bold; }

        #input-container {
            background-color: #1e1e1f;
            border-radius: 28px;
            padding: 8px 16px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }
        #input-container:focus-within { border-color: #444746; background-color: #28292a; }
        
        textarea {
            flex: 1;
            background: none;
            border: none;
            resize: none;
            height: 24px;
            color: #e3e3e3;
            font-size: 1rem;
            outline: none;
            line-height: 24px;
        }
        
        .icon-btn {
            background: none;
            border: none;
            color: #c4c7c5;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn {
            background-color: #a8c7fa;
            color: #042f66;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #send-btn:disabled { background-color: #3c4043; color: #80868b; }

        /* 右側：Artifactsセクション */
        #artifact-section {
            width: 45%;
            min-width: 340px;
            border-left: 1px solid #2f2f30;
            background-color: #1c1b1f;
            display: none; /* JSでflexに変更 */
            flex-direction: column;
            height: 100%;
        }

        .artifact-header {
            padding: 16px;
            background-color: #131314;
            border-bottom: 1px solid #2f2f30;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .artifact-title { font-weight: 500; color: #c4c7c5; font-size: 0.9rem; }
        .close-artifact {
            background: none; border: none; color: #80868b;
            font-size: 1.4rem; cursor: pointer; width: auto; height: auto;
        }

        .artifact-card {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .file-info-box {
            background-color: #28292a;
            border: 1px solid #444746;
            border-radius: 12px;
            padding: 16px;
        }
        .file-meta { font-size: 0.8rem; color: #9aa0a6; margin-bottom: 8px; }
        .file-name { font-size: 1.1rem; font-weight: bold; color: #a8c7fa; margin-bottom: 12px; }
        
        pre {
            background-color: #0f0f11;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #e3e3e3;
            max-height: 350px;
        }
        .action-btn {
            display: inline-block;
            background-color: #004a77;
            color: #c2e7ff;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            margin-top: 12px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #artifact-section {
                position: absolute;
                top: 0; right: 0; width: 100%; height: 100%;
                z-index: 10;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="chat-section">
            <header>
                <div class="brand">Local Gemini Pro</div>
                <select id="model-selector">
                    <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B (最軽量高速化モデル)</option>
                    <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B (標準)</option>
                    <option value="gemma-2-2b-it-q4f16_1-MLC">Gemma 2 2B (Google)</option>
                    <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen 2.5 1.5B (日本語推奨)</option>
                </select>
            </header>
            
            <div id="chat-container">
                <div class="status" id="status">データベース同期中...</div>
            </div>

            <div id="input-outer-container">
                <div id="file-preview-area"></div>
                <div id="input-container">
                    <button class="icon-btn" id="paperclip-btn" onclick="document.getElementById('file-loader').click()">📎</button>
                    <input type="file" id="file-loader" style="display: none;" multiple>
                    
                    <textarea id="user-input" placeholder="メッセージを入力、またはファイルをここにドロップ..." disabled></textarea>
                    <button id="send-btn" disabled>➔</button>
                </div>
            </div>
        </div>

        <div id="artifact-section">
            <div class="artifact-header">
                <div class="artifact-title">Artifact Output</div>
                <button class="close-artifact" id="close-artifact-btn">✕</button>
            </div>
            <div class="artifact-card" id="artifact-card-content"></div>
        </div>
    </div>

    <script type="module">
        import * as webllm from "[https://esm.run/@mlc-ai/web-llm](https://esm.run/@mlc-ai/web-llm)";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');
        const modelSelector = document.getElementById('model-selector');
        const artifactSection = document.getElementById('artifact-section');
        const artifactCardContent = document.getElementById('artifact-card-content');
        const closeArtifactBtn = document.getElementById('close-artifact-btn');
        const fileLoader = document.getElementById('file-loader');
        const filePreviewArea = document.getElementById('file-preview-area');

        let engine;
        let db;
        let conversationHistory = [];
        let attachedFilesContents = []; // 読み込んだファイルのコンテキスト格納庫

        // 1. IndexedDB 永久記憶
        function initDatabase() {
            return new Promise((resolve) => {
                const request = indexedDB.open("LocalLLMMemoryV2", 1);
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains("messages")) {
                        db.createObjectStore("messages", { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
            });
        }

        async function loadHistory() {
            const transaction = db.transaction(["messages"], "readonly");
            const store = transaction.objectStore("messages");
            store.getAll().onsuccess = (e) => {
                conversationHistory = e.target.result || [];
                if (conversationHistory.length > 0) {
                    statusDiv.innerText = `永続記憶から ${conversationHistory.length} 件のログをロードしました。`;
                    conversationHistory.forEach(msg => {
                        appendMessage(msg.text, msg.sender);
                        if (msg.sender === 'ai') inspectAndProcessArtifact(msg.text, false);
                    });
                }
                initLLM();
            };
        }

        // 2. WebWorker経由で超高速・並列初期化
        async function initLLM() {
            const selectedModel = modelSelector.value;
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                statusDiv.innerText = "バックグラウンドWorkerを起動し、高速推論コアを構築中...";
                
                // WebWorkerを利用してメインスレッドの描画遅延を一切排除
                engine = await webllm.CreateCreateWebWorkerEngine(
                    new Worker(new URL("[https://esm.run/@mlc-ai/web-llm](https://esm.run/@mlc-ai/web-llm)")),
                    selectedModel,
                    {
                        initProgressCallback: (report) => {
                            statusDiv.innerText = `高速化キャッシュ同期中: ${Math.round(report.progress * 100)}%\n${report.text}`;
                        }
                    }
                );
                
                statusDiv.innerText = "準備完了！WebGPU + Workerによる高速ローカル処理が有効です。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusDiv.innerText = `初期化エラー: ${error.message}`;
            }
        }

        modelSelector.addEventListener('change', initLLM);

        // 3. ファイル読み込み(インポート)システム
        fileLoader.addEventListener('change', (e) => handleFileImport(e.target.files));
        
        // ドラッグ＆ドロップ対応
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            if(e.dataTransfer.files.length > 0) handleFileImport(e.dataTransfer.files);
        });

        function handleFileImport(files) {
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    attachedFilesContents.push({ name: file.name, content: event.target.result });
                    renderFilePills();
                };
                reader.readAsText(file); // テキストベース・コード・JSON・CSV等全対応
            }
        }

        function renderFilePills() {
            filePreviewArea.innerHTML = '';
            attachedFilesContents.forEach((f, idx) => {
                const pill = document.createElement('div');
                pill.classList.add('preview-pill');
                pill.innerHTML = `📄 ${f.name} <span class="remove-pill" onclick="window.removeAttachedFile(${idx})">✕</span>`;
                filePreviewArea.appendChild(pill);
            });
        }

        window.removeAttachedFile = (idx) => {
            attachedFilesContents.splice(idx, 1);
            renderFilePills();
        };

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // 4. AI 2：全拡張子対応自動パース・Artifact
        function inspectAndProcessArtifact(currentText, shouldOpen = true) {
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)(```|$)/;
            const match = currentText.match(codeBlockRegex);

            if (match) {
                const lang = match[1] || 'txt';
                const code = match[2];
                if (code.trim().length > 3) {
                    renderArtifact(lang, code);
                    if (shouldOpen) artifactSection.style.display = 'flex';
                }
            }
        }

        function renderArtifact(lang, code) {
            artifactCardContent.innerHTML = '';
            
            // すべての言語コードを安全に適切な拡張子へマップ
            const extMap = {
                html: 'html', css: 'css', javascript: 'js', js: 'js', typescript: 'ts', ts: 'ts',
                python: 'py', py: 'py', ruby: 'rb', csharp: 'cs', cpp: 'cpp', c: 'c',
                rust: 'rs', go: 'go', java: 'java', php: 'php', sh: 'sh', powershell: 'ps1',
                json: 'json', yaml: 'yaml', yml: 'yml', xml: 'xml', markdown: 'md', md: 'md'
            };
            const ext = extMap[lang.toLowerCase()] || lang || 'txt';
            const fileName = `app_component_export.${ext}`;

            const box = document.createElement('div');
            box.classList.add('file-info-box');
            box.innerHTML = `
                <div class="file-meta">AI 2 構造解析: 自動識別拡張子 (.${ext})</div>
                <div class="file-name">📄 ${fileName}</div>
                <pre><code>${escapeHtml(code)}</code></pre>
                <a class="action-btn" id="dl-link" href="#">このファイルをエクスポート</a>
            `;
            artifactCardContent.appendChild(box);

            const blob = new Blob([code], { type: 'text/plain' });
            const dlLink = box.querySelector('#dl-link');
            dlLink.href = URL.createObjectURL(blob);
            dlLink.download = fileName;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // 5. 対話実行・ファイル分析コンテキスト統合
        async function handleSend() {
            let text = userInput.value.trim();
            if (!text && attachedFilesContents.length === 0) return;

            userInput.value = '';
            
            // ファイルが添付されている場合、プロンプトの先頭にコンテキストとして注入・分析させる
            let contextPayload = "";
            if (attachedFilesContents.length > 0) {
                contextPayload += "[分析対象ファイルデータ]\n";
                attachedFilesContents.forEach(f => {
                    contextPayload += `--- ファイル名: ${f.name} ---\n${f.content}\n\n`;
                });
                contextPayload += "[ユーザーからの指示]\n" + text;
                appendMessage(`[ファイルを添付しました]\n${text}`, 'user');
            } else {
                appendMessage(text, 'user');
            }

            const finalPrompt = contextPayload || text;
            
            // 履歴保存
            const transaction = db.transaction(["messages"], "readwrite");
            transaction.objectStore("messages").add({ text: finalPrompt, sender: 'user' });
            conversationHistory.push({ text: finalPrompt, sender: 'user' });

            userInput.disabled = true;
            sendBtn.disabled = true;
            const aiMessageDiv = appendMessage("思考解析中...", 'ai');

            try {
                const promptMessages = conversationHistory.map(h => ({
                    role: h.sender === 'user' ? 'user' : 'assistant',
                    content: h.text
                })).slice(-12);

                // もし今回ファイル添付があれば、直近メッセージを置き換え
                if (contextPayload) promptMessages[promptMessages.length - 1].content = finalPrompt;

                const chunks = await engine.chat.completions.create({
                    messages: promptMessages,
                    stream: true
                });

                let reply = "";
                for await (const chunk of chunks) {
                    reply += chunk.choices[0]?.delta?.content || "";
                    aiMessageDiv.innerText = reply;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    inspectAndProcessArtifact(reply, true);
                }

                db.transaction(["messages"], "readwrite").add({ text: reply, sender: 'ai' });
                conversationHistory.push({ text: reply, sender: 'ai' });

            } catch (e) {
                aiMessageDiv.innerText = "エラーが発生しました。";
                console.error(e);
            } finally {
                attachedFilesContents = []; // コンテキストをクリア
                renderFilePills();
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });

        // ✕ボタンで確実に画面領域を閉じるUI修正
        closeArtifactBtn.addEventListener('click', () => {
            artifactSection.style.display = 'none';
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(e => {}); });
        }

        initDatabase().then(loadHistory);
    </script>
</body>
</html>
