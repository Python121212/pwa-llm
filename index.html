<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* モバイルのツールバー対策 */
        }
        header {
            background-color: #4f46e5;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
        }
        .user {
            background-color: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai {
            background-color: white;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .status {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            font-style: italic;
        }
        #input-container {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }
        textarea {
            flex: 1;
            resize: none;
            height: 44px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 22px;
            font-size: 1rem;
            outline: none;
        }
        textarea:focus { border-color: #4f46e5; }
        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>Local LLM Chat</header>
    
    <div id="chat-container">
        <div class="status" id="status">モデルを初期化中...（数分かかる場合があります）</div>
    </div>

    <div id="input-container">
        <textarea id="user-input" placeholder="メッセージを入力..." disabled></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script type="module">
        // WebLLM のインポート
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');

        // 軽量で日本語もそこそこ動くモデルを選択 (環境に合わせて変更可能)
        const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC"; 
        
        let engine;

        // チャットにメッセージを追加する関数
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // WebLLMの初期化
        async function initLLM() {
            try {
                engine = await webllm.CreateCreateWebWorkerEngine(
                    new Worker(new URL("https://esm.run/@mlc-ai/web-llm")),
                    selectedModel,
                    {
                        initProgressCallback: (report) => {
                            statusDiv.innerText = `読み込み中: ${Math.round(report.progress * 100)}% - ${report.text}`;
                        }
                    }
                );
                statusDiv.innerText = "準備完了！モデルはブラウザにキャッシュされています。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusDiv.innerText = "初期化失敗。WebGPUが有効か確認してください。";
                console.error(error);
            }
        }

        // 送信処理
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            appendMessage(text, 'user');
            
            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiMessageDiv = appendMessage("思考中...", 'ai');

            try {
                const messages = [{ role: "user", content: text }];
                const chunks = await engine.chat.completions.create({
                    messages,
                    stream: true
                });

                let reply = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    reply += content;
                    aiMessageDiv.innerText = reply;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (e) {
                aiMessageDiv.innerText = "エラーが発生しました。";
                console.error(e);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Service Worker の登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 登録成功'))
                    .catch(err => console.error('Service Worker 登録失敗', err));
            });
        }

        // 初期化スタート
        initLLM();
    </script>
</body>
</html>
