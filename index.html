<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLLM Local Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans antialiased text-slate-800">

    <header class="bg-white border-b border-slate-200 p-4 shadow-xs">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
            <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <span>🤖</span> WebLLM Local Chat
            </h1>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <select id="model-select" class="w-full sm:w-64 bg-slate-100 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="Llama-3-8B-Instruct-q4f16_1-MLC">Llama 3 8B (ユーザー推奨・要スペック)</option>
                    <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC" selected>Phi-3 Mini 4K (軽量・高速)</option>
                    <option value="Qwen2-0.5B-Instruct-q4f16_1-MLC">Qwen2 0.5B (超軽量・テスト用)</option>
                </select>
                <button id="init-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm px-4 py-1.5 rounded-lg transition-colors shadow-xs shrink-0">
                    初期化
                </button>
            </div>
        </div>
    </header>

    <div id="status-container" class="bg-amber-50 border-b border-amber-200 text-amber-800 text-xs py-2 px-4 text-center hidden">
        <span id="status-text">モデルを読み込んでいます...</span>
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 container max-w-4xl mx-auto flex flex-col gap-4" id="chat-box">
        <div class="bg-blue-50 border border-blue-100 text-blue-800 rounded-xl p-4 text-sm">
            <strong>使い方:</strong> 右上の「初期化」ボタンを押すと、ブラウザへのモデルのダウンロードとWebGPUのセットアップが始まります（初回は数GBの通信が発生します）。完了後、チャットが可能になります。
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex gap-2 items-end">
            <textarea id="user-input" rows="1" placeholder="メッセージを入力... (Ctrl+Enterで送信)" 
                class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none max-h-32" disabled></textarea>
            <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl transition-colors disabled:opacity-40 disabled:hover:bg-indigo-600" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </footer>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        let engine;
        const chatContainer = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const initBtn = document.getElementById("init-btn");
        const modelSelect = document.getElementById("model-select");
        const statusContainer = document.getElementById("status-container");
        const statusText = document.getElementById("status-text");

        // チャット履歴
        let messages = [];

        // 画面自動調整（テキストエリアの自動伸縮）
        userInput.addEventListener("input", () => {
            userInput.style.height = "auto";
            userInput.style.height = userInput.scrollHeight + "px";
        });

        // メッセージを画面に追加
        function appendMessage(role, text) {
            const wrapper = document.createElement("div");
            wrapper.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;
            
            const msgBubble = document.createElement("div");
            msgBubble.className = `max-w-[85%] rounded-2xl px-4 py-2.5 text-sm shadow-xs ${
                role === "user" 
                ? "bg-indigo-600 text-white rounded-br-none" 
                : "bg-white border border-slate-200 text-slate-800 rounded-bl-none"
            }`;
            msgBubble.innerText = text;
            
            wrapper.appendChild(msgBubble);
            chatContainer.appendChild(wrapper);
            
            // 最下部へ自動スクロール
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgBubble;
        }

        // WebLLMの初期化
        initBtn.addEventListener("click", async () => {
            initBtn.disabled = true;
            modelSelect.disabled = true;
            statusContainer.classList.remove("hidden");
            
            try {
                // 進捗コールバック
                const initProgressCallback = (report) => {
                    statusText.innerText = report.text;
                };

                engine = await webllm.CreateCreateMLCEngine(
                    modelSelect.value,
                    { initProgressCallback }
                );

                statusContainer.className = "bg-emerald-50 border-b border-emerald-200 text-emerald-800 text-xs py-2 px-4 text-center";
                statusText.innerText = "準備完了！ローカル環境で実行中。";
                
                userInput.disabled = false;
                sendBtn.disabled = false;
                initBtn.innerText = "初期化済み";
            } catch (error) {
                statusContainer.className = "bg-rose-50 border-b border-rose-200 text-rose-800 text-xs py-2 px-4 text-center";
                statusText.innerText = "エラーが発生しました: " + error.message;
                initBtn.disabled = false;
                modelSelect.disabled = false;
            }
        });

        // 送信処理
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            userInput.value = "";
            userInput.style.height = "auto";
            
            // ユーザーメッセージ追加
            appendMessage("user", text);
            messages.push({ role: "user", content: text });

            // AIの返答枠を用意
            const aiBubble = appendMessage("assistant", "Thinking...");
            
            try {
                let aiResponse = "";
                const reply = await engine.chat.completions.create({
                    messages: messages,
                    stream: true // ストリーミング再生を有効化
                });

                for await (const chunk of reply) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    aiResponse += delta;
                    aiBubble.innerText = aiResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                messages.push({ role: "assistant", content: aiResponse });

            } catch (error) {
                aiBubble.innerText = "エラーが発生しました: " + error.message;
            }
        }

        sendBtn.addEventListener("click", handleSend);
        
        // Ctrl + Enter で送信
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && e.ctrlKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
