<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Local LLM PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f1f1f">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }
    header {
      background-color: #1f1f1f;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }
    #status {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
      padding: 0 10px;
      word-break: break-all;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 85%;
      padding: 10px 15px;
      border-radius: 18px;
      line-height: 1.4;
      word-break: break-all;
    }
    .user {
      align-self: flex-end;
      background-color: #007aff;
      color: white;
    }
    .ai {
      align-self: flex-start;
      background-color: #2f2f2f;
    }
    #input-container {
      padding: 10px;
      background-color: #1f1f1f;
      display: flex;
      gap: 10px;
      border-top: 1px solid #333;
    }
    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid #444;
      background-color: #2a2a2a;
      color: white;
      font-size: 16px;
      outline: none;
    }
    button {
      padding: 0 20px;
      border-radius: 20px;
      border: none;
      background-color: #007aff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      background-color: #444;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <div>Local LLM PWA</div>
    <div id="status">ブラウザのチェック中...</div>
  </header>

  <div id="chat-container">
    <div class="message ai">こんにちは！ブラウザ上で動くローカルLLMです。初回はモデルのダウンロード（数百MB〜1GB程度）が発生します。</div>
  </div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="メッセージを入力..." disabled>
    <button id="send-btn" onclick="sendMessage()" disabled>送信</button>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // スマホのメモリでも耐えられる軽量な1.5Bモデルに設定
    // ※これでも落ちる場合は "Qwen2.5-0.5B-Instruct-q4f16_1-MLC" に変更してください
    const selectedModel = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";
    
    let engine;
    const statusDiv = document.getElementById("status");
    const inputField = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const chatContainer = document.getElementById("chat-container");

    async function initLLM() {
      // 1. WebGPUの対応チェック
      if (!navigator.gpu) {
        statusDiv.innerText = "エラー: このブラウザ/端末はWebGPUに対応していません。";
        return;
      }

      try {
        statusDiv.innerText = "モデルの初期化を開始します...";
        
        // WebWorkerの立ち上げ
        engine = new webllm.CreateWebWorkerEngine(
          new Worker(new URL("https://esm.run/@mlc-ai/web-llm", import.meta.url), {type: "module"}),
          {
            initProgressCallback: (report) => {
              statusDiv.innerText = report.text; // ダウンロード進捗を表示
            }
          }
        );
        
        // モデルのロード（ここでメモリ不足になるとcatchに飛びます）
        await engine.reload(selectedModel);
        statusDiv.innerText = "準備完了 (完全にローカルで動作中)";
        inputField.disabled = false;
        sendBtn.disabled = false;
      } catch (error) {
        statusDiv.innerText = "初期化エラー: メモリ（RAM）不足、または通信エラーです。";
        console.error(error);
      }
    }

    // メッセージ送信処理
    window.sendMessage = async function() {
      const text = inputField.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      inputField.value = "";
      inputField.disabled = true;
      sendBtn.disabled = true;

      const aiMessageDiv = appendMessage("思考中...", "ai");

      try {
        const messages = [{ role: "user", content: text }];
        const chunks = await engine.chat.completions.create({
          messages,
          stream: true,
        });

        let reply = "";
        for await (const chunk of chunks) {
          const content = chunk.choices[0]?.delta?.content || "";
          reply += content;
          aiMessageDiv.innerText = reply;
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }
      } catch (e) {
        aiMessageDiv.innerText = "エラーが発生しました。";
        console.error(e);
      } finally {
        inputField.disabled = false;
        sendBtn.disabled = false;
        inputField.focus();
      }
    };

    function appendMessage(text, sender) {
      const div = document.createElement("div");
      div.classList.add("message", sender);
      div.innerText = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    // PWA Service Worker の登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 登録成功:', reg.scope))
          .catch(err => console.log('Service Worker 登録失敗:', err));
      });
    }

    // 初期化を実行
    initLLM();
  </script>
</body>
</html>
