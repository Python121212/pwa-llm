<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLLM Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#131314">
    <style>
        :root {
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --text-color: #e3e3e3;
            --input-bg: #282a2d;
            --accent-color: #a8c7fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* モバイルのツールバー対策 */
        }

        /* ヘッダー */
        header {
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2f31;
        }

        #status {
            font-size: 0.85rem;
            color: #aaa;
        }

        /* チャットエリア */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .sender {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .message.user .sender {
            color: #c4eded;
        }

        .message .text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 入力エリア */
        #input-container {
            padding: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .input-box {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 8px 16px;
            align-items: center;
            gap: 12px;
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 150px;
        }

        button {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: rgba(168, 199, 250, 0.1);
        }

        button:disabled {
            color: #5f6368;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <div>WebLLM Gemini-like</div>
        <div id="status">モデル初期化中...</div>
    </header>

    <div id="chat-container">
        <div class="message system">
            <div class="sender">AI</div>
            <div class="text">こんにちは！何かお手伝いできることはありますか？（初回はモデルのダウンロードに時間がかかります）</div>
        </div>
    </div>

    <div id="input-container">
        <div class="input-box">
            <textarea id="user-input" rows="1" placeholder="ここに入力してください..." disabled></textarea>
            <button id="send-btn" disabled>送信</button>
        </div>
    </div>

    <script type="module">
        import { CreateWebWorkerEngine } from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/+esm";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');

        // 軽量で高速なモデルを選択（Llama-3-8B-Instructの量子化版など。環境に合わせて変更可能）
        const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC";
        
        let engine;

        // テキストエリアの自動高さ調整
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });

        // メッセージ追加関数
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'あなた' ? 'user' : 'ai');
            
            const senderDiv = document.createElement('div');
            senderDiv.classList.add('sender');
            senderDiv.innerText = sender;

            const textDiv = document.createElement('div');
            textDiv.classList.add('text');
            textDiv.innerText = text;

            msgDiv.appendChild(senderDiv);
            msgDiv.appendChild(textDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return textDiv;
        }

        // WebLLMの初期化
        async function initLLM() {
            try {
                // 進捗状況のコールバック
                const initProgressCallback = (report) => {
                    statusDiv.innerText = report.text;
                };

                // 快適な動作のためにWeb Worker経由でバックグラウンド実行
                engine = await CreateWebWorkerEngine(
                    new Worker(new URL(import.meta.url)),
                    selectedModel,
                    { initProgressCallback }
                );

                statusDiv.innerText = "準備完了";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusDiv.innerText = "エラーが発生しました: " + error.message;
                console.error(error);
            }
        }

        // 送信処理
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage('あなた', text);
            
            // AIの返答用プレースホルダーを作成
            const aiResponseElement = appendMessage('Gemini-Local', '思考中...');

            try {
                const messages = [{ role: "user", content: text }];
                const chunks = await engine.chat.completions.create({
                    messages,
                    stream: true
                });

                let reply = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    reply += content;
                    aiResponseElement.innerText = reply;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (e) {
                aiResponseElement.innerText = "エラーが発生しました。";
                console.error(e);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // ページ読み込み時に初期化
        initLLM();

        // サービスワーカーの登録 (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered', reg))
                    .catch(err => console.error('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
