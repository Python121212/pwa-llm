<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLLM Local Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* スクロールバーをすっきりさせる */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col justify-between antialiased">

    <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold">WebLLM Local Chat</h1>
        <div id="status" class="text-xs bg-indigo-700 px-3 py-1 rounded-full">初期化中...</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-3xl w-full mx-auto">
        <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-100">
            <p class="text-slate-600 text-sm">
                💡 <strong>注意:</strong> 初回はモデルのダウンロード（数GB）が発生するため、Wi-Fi環境での実行を強く推奨します。ダウンロードされたモデルはブラウザのCacheに保存されます。
            </p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 p-4 shrink-0">
        <div class="max-w-3xl w-full mx-auto flex gap-2">
            <input type="text" id="user-input" disabled
                class="flex-1 border border-slate-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100" 
                placeholder="モデルの準備を待っています...">
            <button id="send-btn" disabled
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition disabled:bg-slate-300">
                送信
            </button>
        </div>
    </footer>

    <script type="module">
        // ESM形式でWebLLMをインポート
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');

        // 軽量で日本語もそこそこ動くモデルを選択 (Llama-3-8B もしくは Qwenなど)
        const selectedModel = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC"; 
        
        let engine;

        // チャット画面にメッセージを追加する関数
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const innerDiv = document.createElement('div');
            innerDiv.className = role === 'user' 
                ? 'bg-indigo-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm' 
                : 'bg-white text-slate-800 p-3 rounded-lg max-w-[85%] shadow-sm border border-slate-200';
            innerDiv.innerText = text;
            
            msgDiv.appendChild(innerDiv);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // 自動スクロール
            return innerDiv;
        }

        // WebLLMエンジンの初期化
        async function initLLM() {
            try {
                engine = await webllm.CreateCreateWebWorkerEngine(
                    new Worker(new URL("https://esm.run/@mlc-ai/web-llm")), // ワーカー経由でUIを重くさせない
                    selectedModel,
                    {
                        initProgressCallback: (report) => {
                            statusDiv.innerText = report.text; // 進捗を表示
                        }
                    }
                );
                statusDiv.innerText = "準備完了 (ローカル動作中)";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "メッセージを入力...";
            } catch (error) {
                statusDiv.innerText = "エラーが発生しました";
                console.error(error);
            }
        }

        // 送信処理
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            
            // AIの返答枠を作成
            const aiMessageElement = appendMessage('ai', '思考中...');
            
            try {
                const messages = [{ role: "user", content: text }];
                const chunks = await engine.chat.completions.create({
                    messages,
                    stream: true // ストリーミング再生
                });

                let reply = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    reply += content;
                    aiMessageElement.innerText = reply;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (e) {
                aiMessageElement.innerText = "エラーが起きました。追加のモデルロードが必要か、スペック不足の可能性があります。";
                console.error(e);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        // 初期化実行
        initLLM();

        // PWAサービスワーカーの登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
</body>
</html>
